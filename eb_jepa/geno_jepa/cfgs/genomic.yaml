# Genomic JEPA (VICReg/BCS) Training Configuration
# Train a self-supervised representation model on genomic data (gene expression + DNA methylation)

meta:
  seed: 42
  device: auto  # auto, cuda, or cpu

data:
  use_genomic: true  # Use genomic data instead of CIFAR-10
  use_channels: both # 'both', 'gene', or 'meth'
  base_path: /data/TCGA_cleaned
  batch_size: 128     # Smaller batch size for genomic data
  num_workers: 12

model:
  # Backbone
  type: mlp       # conv1d, mlp, vit (for genomic), resnet, vit_s, vit_b (for images)
  
  # Conv 1D parameters
  latent_dim: 4096

  # ViT parameters (only used if type=vit)
  # patch_size: 190
  # hidden_dim: 256
  # num_layers: 6
  # num_heads: 8
  # mlp_dim: 512

  # # MLP parameters (only used if type=mlp)
  hidden_dim: 4096  # First hidden layer size (output is hidden_dim // 4)
  dropout: 0.2      # Dropout rate

  # Projector
  use_projector: true
  proj_hidden_dim: 64
  proj_output_dim: 64

loss:
  type: vicreg       # vicreg or bcs
  # VICReg loss weights
  std_coeff: 1.0
  cov_coeff: 80.0
  # BCS loss weight (only used if type=bcs)
  lmbd: 10.0

optim:
  epochs: 150
  lr: 0.1            # Lower learning rate for genomic data
  weight_decay: 1.0e-4
  warmup_epochs: 10
  warmup_start_lr: 1.0e-5
  min_lr: 0.0

logging:
  log_wandb: true
  wandb_group: genomic_jepa  # Group genomic runs together
  log_every: 5       # Log every N epochs
  save_every: 25     # Save checkpoint every N epochs
  tqdm_silent: false # Disable tqdm progress bars

training:
  use_amp: true      # Use automatic mixed precision
  dtype: bfloat16    # float16 or bfloat16

# Notes:
# - Input data: 2-channel images of shape (2, 383, 41)
#   - Channel 0: Gene expression (reshaped from 15703)
#   - Channel 1: DNA methylation (reshaped from 15703)
# - Augmentations: Gaussian noise, random masking, channel dropout
# - Output: Self-supervised representations for downstream cancer classification
